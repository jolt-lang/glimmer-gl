name: tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: glimmer-gl
      - name: Check out sibling glimmer dep
        uses: actions/checkout@v4
        with:
          repository: jolt-lang/glimmer
          ref: v0.0.1
          path: glimmer
      - name: Install joltc
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y liblz4-1 zlib1g libtinfo6 libgtk-4-1 libgl1
          url=$(curl -fsSL https://api.github.com/repos/jolt-lang/jolt/releases/latest \
                | jq -r '.assets[] | select(.name | test("x86_64-linux\\.tar\\.gz$")) | .browser_download_url')
          mkdir -p "$HOME/.jolt"
          curl -fsSL "$url" | tar xz -C "$HOME/.jolt" --strip-components=1
          chmod +x "$HOME/.jolt/joltc"
          echo "$HOME/.jolt" >> "$GITHUB_PATH"
      - name: Test
        working-directory: glimmer-gl
        run: JOLT_PWD="$PWD" joltc -M:test
